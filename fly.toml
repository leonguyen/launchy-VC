app = "your-unique-app-name"
primary_region = "bos" # Change to your closest region (e.g., lax, cdg, ams)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
