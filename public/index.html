<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launchy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.3/Sortable.min.js"></script>
<style>
:root {
  --bg: #101722;
  --bg-card: rgba(18, 24, 34, 0.90);
  --bg-card-hover: rgba(25, 32, 44, 0.88);
  --bg-input: rgba(12, 16, 24, 0.9);
  --text: #f8fafc;
  --text-muted: #aeb8d0;
  --accent: #e94b2e;
  --accent-hover: #ff6347;
  --accent-blue: #38bdf8;
  --border: rgba(255,255,255,0.07);
  --danger: #ff5252;
  --success: #4caf50;
  --shadow: 0 12px 35px rgba(0,0,0,0.28);
  --radius: 10px;
}

[data-theme="light"] {
  --bg: #f0f2f5;
  --bg-card: rgba(255,255,255,0.95);
  --bg-card-hover: rgba(245,246,250,0.95);
  --bg-input: #e8eaef;
  --text: #111318;
  --text-muted: #5f6a78;
  --accent: #d4421e;
  --accent-hover: #e94b2e;
  --accent-blue: #2196f3;
  --border: rgba(0,0,0,0.08);
  --danger: #e53935;
  --success: #43a047;
  --shadow: 0 8px 24px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

#bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  display: none;
}
#bg-overlay {
  position: fixed; inset: 0; z-index: 0;
  background: var(--bg);
  display: none;
}

#login-screen, #app { position: relative; z-index: 1; }

/* ─── Login ───────────────────────────────── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.login-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 40px; width: 100%; max-width: 380px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.login-box h1 { display: none; }
.login-logo { display: block; margin: 0 auto 16px; height: 56px; }
.topbar-logo { height: 40px; vertical-align: middle; }
.login-box p { color: var(--text-muted); text-align: center; margin-bottom: 24px; font-size: 14px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }

input, select, textarea {
  width: 100%; padding: 10px 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
input[type="color"] { padding: 4px; height: 40px; cursor: pointer; }
input[type="range"] { padding: 0; }

.btn {
  padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 14px; font-weight: 500; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: white; width: 100%; justify-content: center; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { color: var(--text); background: var(--bg-input); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { opacity: 0.85; }
.btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn-outline:hover { background: var(--accent); color: white; }

.login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }
.login-toggle { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
.login-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }

/* ─── Top bar ─────────────────────────────── */
#app { display: none; }

.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.topbar-brand { font-weight: 700; font-size: 16px; color: #e94b2e; margin-right: 8px; }

.tabs {
  display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 8px 16px; border-radius: 6px; cursor: pointer;
  font-size: 13px; white-space: nowrap; color: var(--text-muted);
  transition: all 0.2s; position: relative; display: flex; align-items: center; gap: 4px;
}
.tab:hover { color: var(--text); background: var(--bg-card-hover); }
.tab.active {
  color: var(--text); background: rgba(233, 75, 46, 0.12);
  border: 1px solid rgba(233, 75, 46, 0.28); font-weight: 600;
}
.tab.shared-tab { font-style: italic; }
.tab .tab-icon { font-size: 11px; opacity: 0.6; }

.tab .tab-close {
  display: none; margin-left: 6px; font-size: 14px; line-height: 1; opacity: 0.5;
}
.tab:hover .tab-close { display: inline; }
.tab .tab-close:hover { opacity: 1; color: var(--danger); }

.tab-add {
  padding: 8px; cursor: pointer; color: var(--text-muted);
  font-size: 18px; line-height: 1; border-radius: 6px;
}
.tab-add:hover { color: var(--accent); background: var(--bg-input); }

.topbar-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; background: transparent;
  border: 1px solid var(--border); color: var(--text); transition: all 0.2s;
}
.theme-toggle:hover { background: var(--bg-input); }

.user-menu {
  padding: 6px 12px; border-radius: 6px; font-size: 13px;
  color: var(--text-muted); cursor: pointer; border: 1px solid var(--border);
}
.user-menu:hover { background: var(--bg-input); }

/* ─── Dashboard ───────────────────────────── */
.dashboard {
  display: flex; gap: 16px; padding: 16px; align-items: flex-start;
  overflow: hidden; min-height: calc(100vh - 56px);
}
.column {
  flex: 0 1 auto; min-width: 200px; position: relative;
  display: flex; flex-direction: column; gap: 12px;
}
.column-resize-handle {
  position: absolute; right: -9px; top: 0; bottom: 0;
  width: 18px; cursor: col-resize; z-index: 10;
}
.column-resize-handle::after {
  content: ''; position: absolute; left: 8px;
  top: 10%; bottom: 10%; width: 3px;
  background: var(--border); border-radius: 2px;
  opacity: 0; transition: opacity 0.2s;
}
.column-resize-handle:hover::after { opacity: 1; background: var(--accent); }
.column.resizing { user-select: none; }
body.col-resizing { cursor: col-resize !important; user-select: none; }
body.col-resizing * { cursor: col-resize !important; }
.column.sortable-ghost { opacity: 0.3; }
.column.sortable-drag { box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 999; }
.column-header { display: flex; align-items: center; gap: 8px; padding: 0 4px; }
.column-header h3 {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: #b8c0d0; flex: 1; cursor: pointer;
  padding-bottom: 10px; position: relative;
}
.column-header h3::after {
  content: ''; display: block; width: 28px; height: 2px;
  margin-top: 8px; background: var(--accent); border-radius: 99px;
  position: absolute; bottom: 0; left: 0;
}
.column-header .col-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
.column-header:hover .col-actions { opacity: 1; }

.columns-sortable {
  display: flex; gap: 16px; align-items: flex-start; flex: 1; min-width: 0; overflow: hidden;
}
.add-column-btn {
  min-width: 44px; height: 44px; border-radius: var(--radius);
  border: 2px dashed var(--border); display: flex; align-items: center;
  justify-content: center; cursor: pointer; color: var(--text-muted);
  font-size: 24px; transition: all 0.2s; align-self: flex-start; margin-top: 24px;
}
.add-column-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── Widget ──────────────────────────────── */
.widget {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow); transition: all 0.2s;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.widget:hover { box-shadow: 0 16px 40px rgba(0,0,0,0.35); }
.widget.sortable-ghost { opacity: 0.4; }
.widget.sortable-drag { box-shadow: 0 8px 32px rgba(0,0,0,0.3); }


.widget-pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 6px 8px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
}
.widget-pagination button {
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text-muted); border-radius: 4px; padding: 2px 8px;
  cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.widget-pagination button:hover { color: var(--text); border-color: var(--accent); }
.widget-pagination button:disabled { opacity: 0.3; cursor: default; }
.widget-pagination button:disabled:hover { color: var(--text-muted); border-color: var(--border); }

.widget-header {
  display: flex; align-items: center; padding: 10px 14px;
  border-bottom: 1px solid var(--border); cursor: grab;
}
.widget-header:active { cursor: grabbing; }
.widget-title { font-size: 13px; font-weight: 600; flex: 1; cursor: pointer; }
.widget-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
.widget-header:hover .widget-actions { opacity: 1; }

.widget-body { padding: 10px; }

/* ─── Bookmarks: Grid (default) ──────────── */
.bookmarks-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); gap: 4px;
}
.bookmark-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 4px; border-radius: 6px; cursor: pointer;
  text-decoration: none; color: var(--text); transition: background 0.15s; position: relative;
}
.bookmark-item:hover { background: var(--bg-card-hover); }
.bookmark-item img { width: 42px; height: 42px; border-radius: 12px; background: var(--bg-input); }
.bookmark-item span {
  font-size: 11px; text-align: center; line-height: 1.3;
  max-width: 100%; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; color: var(--text-muted);
}
.bookmark-item .bm-edit {
  position: absolute; top: 2px; right: 2px;
  width: 20px; height: 20px; border-radius: 4px;
  background: var(--bg-card); border: 1px solid var(--border);
  display: none; align-items: center; justify-content: center;
  font-size: 10px; cursor: pointer; color: var(--text-muted);
}
.bookmark-item:hover .bm-edit { display: flex; }

.bookmark-add {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 10px 4px; border-radius: 6px; border: 1px dashed var(--border);
  cursor: pointer; color: var(--text-muted); font-size: 22px;
  min-height: 72px; transition: all 0.2s;
}
.bookmark-add:hover { border-color: var(--accent); color: var(--accent); }

/* ─── Bookmarks: Grid compact ────────────── */
.bookmarks-grid.view-grid-sm { grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 2px; }
.bookmarks-grid.view-grid-sm .bookmark-item { padding: 6px 2px; gap: 4px; }
.bookmarks-grid.view-grid-sm .bookmark-item img { width: 28px; height: 28px; border-radius: 8px; }
.bookmarks-grid.view-grid-sm .bookmark-item span { font-size: 9px; }
.bookmarks-grid.view-grid-sm .bookmark-add { min-height: 48px; font-size: 16px; }

/* ─── Bookmarks: Grid large ──────────────── */
.bookmarks-grid.view-grid-lg { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
.bookmarks-grid.view-grid-lg .bookmark-item { padding: 12px 6px; gap: 8px; }
.bookmarks-grid.view-grid-lg .bookmark-item img { width: 56px; height: 56px; border-radius: 16px; }
.bookmarks-grid.view-grid-lg .bookmark-item span { font-size: 12px; font-weight: 500; }
.bookmarks-grid.view-grid-lg .bookmark-add { min-height: 96px; font-size: 28px; }

/* ─── Bookmarks: Icons only ──────────────── */
.bookmarks-grid.view-icons { grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 4px; }
.bookmarks-grid.view-icons .bookmark-item { padding: 6px; gap: 0; }
.bookmarks-grid.view-icons .bookmark-item img { width: 36px; height: 36px; border-radius: 10px; }
.bookmarks-grid.view-icons .bookmark-item span { display: none; }
.bookmarks-grid.view-icons .bookmark-add { min-height: 48px; font-size: 18px; padding: 6px; }

/* ─── Bookmarks: List view ───────────────── */
.bookmarks-grid.view-list { display: flex; flex-direction: column; gap: 1px; }
.bookmarks-grid.view-list .bookmark-item {
  flex-direction: row; padding: 7px 8px; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.bookmarks-grid.view-list .bookmark-item img { width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; }
.bookmarks-grid.view-list .bookmark-item span {
  text-align: left; font-size: 13px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.bookmarks-grid.view-list .bookmark-add {
  flex-direction: row; min-height: auto; padding: 7px 8px;
  font-size: 14px; justify-content: flex-start; gap: 8px;
}

/* ─── RSS: Headlines (compact) ───────────── */
.rss-items.view-headlines .rss-item { padding: 5px 4px; gap: 0; }
.rss-items.view-headlines .rss-item-img { display: none; }
.rss-items.view-headlines .rss-item-title { font-size: 13px; -webkit-line-clamp: 1; }
.rss-items.view-headlines .rss-item-date { font-size: 10px; }

/* ─── RSS: Magazine (featured first) ─────── */
.rss-items.view-magazine .rss-item:first-child { flex-direction: column; }
.rss-items.view-magazine .rss-item:first-child .rss-item-img {
  width: 100%; height: 140px; border-radius: 6px; margin-bottom: 4px;
}
.rss-items.view-magazine .rss-item:first-child .rss-item-title {
  font-size: 15px; font-weight: 600; -webkit-line-clamp: 3;
}

/* ─── RSS: Full (large images) ───────────── */
.rss-items.view-full .rss-item { flex-direction: column; padding: 10px 4px; }
.rss-items.view-full .rss-item-img {
  width: 100%; height: 120px; border-radius: 6px; margin-bottom: 6px;
}
.rss-items.view-full .rss-item-title { font-size: 14px; -webkit-line-clamp: 3; }

/* ─── View mode button ──────────────────── */
.view-mode-dropdown {
  position: absolute; right: 0; top: 100%;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 500; min-width: 160px;
}
.view-mode-option {
  padding: 7px 12px; border-radius: 4px; cursor: pointer;
  font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 8px;
}
.view-mode-option:hover { background: var(--bg-input); }
.view-mode-option.active { color: var(--accent); font-weight: 600; }

/* ─── Icon picker ─────────────────────────── */
.icon-picker-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.icon-picker-tabs .btn.active { background: var(--accent); color: white; }
.icon-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
  gap: 6px; max-height: 220px; overflow-y: auto; padding: 4px;
  border: 1px solid var(--border); border-radius: 6px; margin-top: 8px;
}
.icon-grid-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 2px; border-radius: 6px; cursor: pointer; transition: background 0.15s;
}
.icon-grid-item:hover { background: var(--bg-card-hover); }
.icon-grid-item.selected { background: var(--accent); border-radius: 6px; }
.icon-grid-item img { width: 28px; height: 28px; }
.icon-grid-item span { font-size: 9px; color: var(--text-muted); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
.icon-grid-item.selected span { color: white; }
.icon-picker-tabs { flex-wrap: wrap; }
.icon-preview { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding: 8px; background: var(--bg-input); border-radius: 6px; }
.icon-preview img { width: 32px; height: 32px; border-radius: 6px; }
.icon-preview span { font-size: 12px; color: var(--text-muted); }

/* ─── RSS feed ────────────────────────────── */
.rss-items { display: flex; flex-direction: column; }
.rss-item {
  display: flex; gap: 10px;
  padding: 8px 4px; border-bottom: 1px solid var(--border);
  text-decoration: none; color: var(--text); transition: background 0.15s;
}
.rss-item:last-child { border-bottom: none; }
.rss-item:hover { background: var(--bg-card-hover); }
.rss-item-img {
  width: 80px; height: 56px; border-radius: 4px;
  object-fit: cover; background: var(--bg-input); flex-shrink: 0;
}
.rss-item-content { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
.rss-item-title { font-size: 14px; line-height: 1.45; color: var(--text); font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rss-item-date { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

.rss-tooltip {
  position: fixed; z-index: 900; pointer-events: none;
  max-width: 380px; padding: 14px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  opacity: 0; transition: opacity 0.15s ease;
}
.rss-tooltip.show { opacity: 1; }
.rss-tooltip-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
.rss-tooltip-snippet { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.rss-tooltip-date { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
.rss-tooltip-img { width: 100%; max-height: 140px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; }

/* ─── RSS Settings Panel ─────────────────── */
.rss-settings-tabs { display: flex; gap: 0; margin: -8px -8px 16px -8px; border-bottom: 1px solid var(--border); }
.rss-tab { flex: 1; padding: 10px 0; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.rss-tab:hover { color: var(--text); }
.rss-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.rss-tab-content { display: none; }
.rss-tab-content.active { display: block; }
.rss-feed-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
.rss-feed-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 8px; background: var(--bg-input); }
.rss-feed-item:hover { background: var(--bg-card-hover); }
.rss-feed-handle { cursor: grab; color: var(--text-muted); font-size: 16px; flex-shrink: 0; user-select: none; }
.rss-feed-handle:active { cursor: grabbing; }
.rss-feed-icon { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; object-fit: contain; background: var(--bg-card); }
.rss-feed-info { flex: 1; min-width: 0; }
.rss-feed-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rss-feed-url { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rss-feed-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; flex-shrink: 0; }
.rss-feed-del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
.rss-add-feed { width: 100%; padding: 10px; border: 1px dashed var(--border); border-radius: 8px; background: none; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.rss-add-feed:hover { border-color: var(--accent); color: var(--accent); }
.setting-section { margin-bottom: 16px; }
.setting-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.setting-section select { width: 100%; padding: 10px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; }
.setting-toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--border); }
.setting-toggle span { font-size: 13px; color: var(--text); }
.toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--bg-input); border-radius: 24px; cursor: pointer; transition: background 0.2s; }
.toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
.toggle-switch input:checked + .toggle-slider { background: var(--accent); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
.setting-apply-all { display: block; margin-top: 16px; padding: 10px 0; text-align: center; color: var(--accent); font-size: 13px; cursor: pointer; text-decoration: none; border: none; background: none; width: 100%; }
.setting-apply-all:hover { text-decoration: underline; }
/* ─── RSS: Featured first article ────────── */
.rss-items:not(.img-none) .rss-item:first-child { flex-direction: column; }
.rss-items:not(.img-none) .rss-item:first-child .rss-item-img {
  width: 100%; height: 160px; border-radius: 8px; margin-bottom: 6px;
}
.rss-items:not(.img-none) .rss-item:first-child .rss-item-title {
  font-size: 16px; font-weight: 700; -webkit-line-clamp: 3;
}
.rss-items:not(.img-none) .rss-item:first-child .rss-item-snippet {
  -webkit-line-clamp: 3; font-size: 13px;
}

.rss-items.img-none .rss-item-img { display: none; }
.rss-items.img-small .rss-item-img { width: 60px; height: 42px; }
.rss-items.img-large .rss-item-img { width: 100%; height: 120px; border-radius: 6px; margin-bottom: 6px; }
.rss-items.img-large .rss-item { flex-direction: column; }
.rss-items.no-timestamps .rss-item-date { display: none; }
.rss-items.truncate-titles .rss-item-title { -webkit-line-clamp: 1; }
.rss-item-snippet { font-size: 12px; color: #8b95a7; line-height: 1.4; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ─── Notes ───────────────────────────────── */
.notes-content {
  width: 100%; min-height: 100px; background: transparent; border: none;
  color: var(--text); font-size: 13px; line-height: 1.6; resize: vertical;
  font-family: inherit; padding: 0;
}
.notes-content:focus { outline: none; }

/* ─── Weather widget ──────────────────────── */
.weather-main { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
.weather-icon { font-size: 42px; line-height: 1; }
.weather-temp { font-size: 32px; font-weight: 700; }
.weather-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.weather-details { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); margin-top: 8px; }
.weather-forecast {
  display: flex; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
}
.weather-forecast-day {
  flex: 1; text-align: center; font-size: 12px;
}
.weather-forecast-day .wf-date { color: var(--text-muted); margin-bottom: 4px; }
.weather-forecast-day .wf-temps { font-weight: 600; }
.weather-loading, .weather-error { padding: 12px; font-size: 13px; color: var(--text-muted); }

/* ─── Weather widget (enhanced) ──────────── */
.weather-widget {
  border-radius: 8px; padding: 12px; transition: background 0.4s;
}
.weather-current {
  display: flex; align-items: center; gap: 14px; margin-bottom: 10px;
}
.weather-svg-icon { width: 64px; height: 64px; flex-shrink: 0; }
.weather-svg-icon svg { width: 100%; height: 100%; }
.weather-temp { font-size: 32px; font-weight: 700; line-height: 1.1; }
.weather-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; text-transform: capitalize; }

.weather-info-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin-bottom: 10px;
}
.weather-info-item {
  display: flex; flex-direction: column; gap: 1px;
  padding: 6px 8px; border-radius: 6px;
  background: var(--bg-input); border: 1px solid var(--border);
}
.wi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
.wi-value { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.wi-value svg { flex-shrink: 0; }

.weather-sun {
  display: flex; justify-content: center; gap: 24px;
  font-size: 12px; color: var(--text-muted); padding: 6px 0;
  border-top: 1px solid var(--border);
  margin-bottom: 8px;
}
.weather-sun span { display: flex; align-items: center; gap: 5px; }
.weather-sun svg { flex-shrink: 0; }

.weather-hourly {
  display: flex; gap: 2px; overflow-x: auto; padding: 6px 0;
  border-top: 1px solid var(--border);
  scrollbar-width: none; margin-bottom: 8px;
}
.weather-hourly::-webkit-scrollbar { display: none; }
.weather-hourly-item {
  flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 5px 8px; border-radius: 6px; min-width: 48px;
  transition: background 0.15s;
}
.weather-hourly-item:hover { background: var(--bg-card-hover); }
.wh-time { font-size: 10px; color: var(--text-muted); font-weight: 600; }
.wh-icon { width: 24px; height: 24px; }
.wh-icon svg { width: 100%; height: 100%; }
.wh-temp { font-size: 12px; font-weight: 700; }
.wh-rain { font-size: 9px; color: #38bdf8; }

.weather-forecast-5d {
  display: flex; gap: 4px; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.weather-forecast-5d .weather-forecast-day {
  flex: 1; text-align: center; font-size: 11px;
  padding: 6px 2px; border-radius: 6px; transition: background 0.15s;
}
.weather-forecast-5d .weather-forecast-day:hover { background: var(--bg-card-hover); }
.weather-forecast-5d .wf-date { color: var(--text-muted); margin-bottom: 3px; font-weight: 600; text-transform: capitalize; }
.weather-forecast-5d .wf-icon { width: 28px; height: 28px; margin: 2px auto; }
.weather-forecast-5d .wf-icon svg { width: 100%; height: 100%; }
.weather-forecast-5d .wf-temps { font-weight: 600; margin-top: 2px; }
.weather-forecast-5d .wf-rain { font-size: 9px; color: #38bdf8; margin-top: 1px; }

.weather-updated {
  text-align: center; font-size: 10px; color: rgba(174,184,208,0.4);
  margin-top: 6px;
}
.weather-link {
  display: block; text-align: right; margin-top: 8px; font-size: 11px;
}
.weather-link a {
  color: var(--text-muted); text-decoration: none; opacity: 0.6; transition: opacity .2s;
}
.weather-link a:hover { opacity: 1; text-decoration: underline; }

@keyframes weather-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes weather-float { 0%,100% { transform: translateX(0); } 50% { transform: translateX(3px); } }
@keyframes weather-rain { 0% { transform: translateY(-4px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(8px); opacity: 0; } }
@keyframes weather-snow { 0% { transform: translateY(-4px) rotate(0deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(8px) rotate(90deg); opacity: 0; } }
@keyframes weather-flash { 0%,100% { opacity: 0; } 5%,15% { opacity: 1; } 10%,20% { opacity: 0; } }
@keyframes weather-fog { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

/* ─── Clock widget ────────────────────────── */
.clock-display { text-align: center; padding: 16px 0; }
.clock-time { font-size: 48px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
.clock-date { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
.clock-timezone { font-size: 11px; color: var(--text-muted); margin-top: 4px; opacity: 0.7; }

/* ─── Search widget ───────────────────────── */
.search-form { display: flex; gap: 8px; }
.search-form input {
  flex: 1; padding: 10px 14px; border-radius: 20px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); font-size: 14px;
}
.search-form input:focus { border-color: var(--accent); }
.search-form button {
  padding: 10px 18px; border-radius: 20px; background: var(--accent);
  color: white; border: none; cursor: pointer; font-size: 14px; font-weight: 500;
}
.search-form button:hover { background: var(--accent-hover); }
.search-engine-label { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: right; }

/* ─── Embed widget ────────────────────────── */
.embed-frame {
  width: 100%; border: none; border-radius: 4px;
  background: var(--bg-input); min-height: 200px;
}

/* ─── Modal ───────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px; width: 90%; max-width: 480px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  transform: scale(0.95); transition: transform 0.2s;
  max-height: 85vh; overflow-y: auto;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal .form-group { margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.modal-section { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.modal-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); }

.share-user-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.share-user-row:last-child { border-bottom: none; }

/* ─── Toast ───────────────────────────────── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 16px; border-radius: 8px; font-size: 13px;
  background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow);
  animation: toastIn 0.3s ease;
}
.toast.error { border-color: var(--danger); }
.toast.success { border-color: var(--success); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } }

/* ─── Dropdown ────────────────────────────── */
.dropdown {
  position: absolute; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 500; min-width: 180px;
}
.dropdown-item {
  padding: 8px 12px; border-radius: 4px; cursor: pointer;
  font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px;
}
.dropdown-item:hover { background: var(--bg-input); }
.dropdown-item.danger { color: var(--danger); }
.dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }

.context-menu { position: fixed; z-index: 600; }

/* ─── Public banner ───────────────────────── */
.public-banner {
  background: var(--accent); color: white; text-align: center;
  padding: 10px; font-size: 14px;
}

/* ─── AI Chat widget ─────────────────────── */
.ai-chat { display: flex; flex-direction: column; height: 400px; }
.ai-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 8px 0; }
.ai-msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
.ai-msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
.ai-msg.assistant { align-self: flex-start; background: var(--bg-input); color: var(--text); border-bottom-left-radius: 4px; }
.ai-msg.error { align-self: center; background: rgba(255,60,60,0.15); color: #ff6b6b; font-size: 12px; }
.ai-input-row { display: flex; gap: 6px; padding-top: 8px; border-top: 1px solid var(--border); }
.ai-input-row input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: inherit; }
.ai-input-row input:focus { outline: none; border-color: var(--accent); }
.ai-input-row button { background: var(--accent); border: none; border-radius: 8px; padding: 8px 14px; color: white; cursor: pointer; font-size: 14px; }
.ai-input-row button:hover { opacity: 0.9; }
.ai-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
.ai-typing { align-self: flex-start; color: var(--text-muted); font-size: 12px; font-style: italic; }
.ai-no-key { padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
.ai-no-key button { margin-top: 10px; }

.hidden { display: none !important; }
.sortable-drag { z-index: 999; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <img src="/logo.png" alt="Launchy" class="login-logo">
    <h1>Launchy</h1>
    <p id="login-subtitle">Connectez-vous pour acceder a votre tableau de bord</p>
    <form id="login-form">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="login-user" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Se connecter</button>
      <div class="login-error" id="login-error"></div>
    </form>
    <div class="login-toggle">
      <span id="toggle-text">Pas encore de compte ?</span>
      <a id="toggle-link" onclick="toggleAuthMode()">Creer un compte</a>
    </div>
  </div>
</div>

<!-- Public page view -->
<div id="public-view" style="display:none">
  <div class="public-banner" id="public-banner"></div>
  <div class="dashboard" id="public-dashboard"></div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <img src="/logo.png" alt="Launchy" class="topbar-logo">
    <div class="tabs" id="tabs"></div>
    <div class="tab-add" onclick="addPage()" title="Nouvelle page">+</div>
    <div class="topbar-actions">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Changer le theme"></button>
      <div class="user-menu" id="user-menu" onclick="showUserMenu(event)"></div>
    </div>
  </div>
  <div class="dashboard" id="dashboard"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div class="toast-container" id="toast-container"></div>
<div class="rss-tooltip" id="rss-tooltip">
  <img class="rss-tooltip-img" id="rss-tooltip-img" src="" alt="" style="display:none">
  <div class="rss-tooltip-title" id="rss-tooltip-title"></div>
  <div class="rss-tooltip-snippet" id="rss-tooltip-snippet"></div>
  <div class="rss-tooltip-date" id="rss-tooltip-date"></div>
</div>

<input type="file" id="import-file-input" accept=".html,.htm,.opml,.xml" style="display:none">

<script>
// ─── State ────────────────────────────────────────────
if (!localStorage.getItem('launchy_token') && localStorage.getItem('startme_token')) {
  localStorage.setItem('launchy_token', localStorage.getItem('startme_token'));
  localStorage.removeItem('startme_token');
}
let token = localStorage.getItem('launchy_token');
let currentUser = null;
let dashboard = [];
let sharedPages = [];
let activePageId = null;
let activeSharedPageId = null;
let sortableInstances = [];
let clockIntervals = [];
let widgetPages = {};

// ─── API helper ───────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: 'Bearer ' + token } : {}),
      ...opts.headers
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (res.status === 401) { logout(); throw new Error('Non authentifie'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erreur');
  return data;
}

// ─── Check for public page ───────────────────────────
function checkPublicPage() {
  const hash = location.hash;
  const m = hash.match(/^#\/public\/(\d+)$/);
  if (m) {
    loadPublicPage(m[1]);
    return true;
  }
  return false;
}

async function loadPublicPage(pageId) {
  try {
    const res = await fetch('/api/public/page/' + pageId);
    if (!res.ok) throw new Error('Page non trouvée');
    const page = await res.json();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'none';
    document.getElementById('public-view').style.display = 'block';
    document.getElementById('public-banner').textContent = `${page.title} — partage par ${page.owner_name}`;
    renderPublicPage(page);
  } catch {
    document.getElementById('public-view').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">Page non trouvee ou non publique.</div>';
    document.getElementById('public-view').style.display = 'block';
    document.getElementById('login-screen').style.display = 'none';
  }
}

function renderPublicPage(page) {
  const el = document.getElementById('public-dashboard');
  el.innerHTML = page.columns.map(col => `
    <div class="column">
      <div class="column-header"><h3>${esc(col.title)}</h3></div>
      <div class="widgets-container">
        ${col.widgets.map(w => renderWidget(w, true)).join('')}
      </div>
    </div>
  `).join('');
  loadRSSFeeds(page);
  startClocks();
  loadWeatherWidgets(page);
}

// ─── Auth ─────────────────────────────────────────────
let isRegisterMode = false;

function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('login-subtitle').textContent = isRegisterMode
    ? 'Creez votre compte pour commencer'
    : 'Connectez-vous pour acceder a votre tableau de bord';
  document.getElementById('login-btn').textContent = isRegisterMode ? 'Creer le compte' : 'Se connecter';
  document.getElementById('toggle-text').textContent = isRegisterMode ? 'Deja un compte ?' : 'Pas encore de compte ?';
  document.getElementById('toggle-link').textContent = isRegisterMode ? 'Se connecter' : 'Creer un compte';
  document.getElementById('login-error').style.display = 'none';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  try {
    const endpoint = isRegisterMode ? '/auth/register' : '/auth/login';
    const data = await api(endpoint, { method: 'POST', body: { username, password } });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('launchy_token', token);
    initApp();
  } catch (err) {
    const el = document.getElementById('login-error');
    el.textContent = err.message;
    el.style.display = 'block';
  }
});

function logout() {
  token = null;
  currentUser = null;
  localStorage.removeItem('launchy_token');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('public-view').style.display = 'none';
  clearBackground();
}

// ─── Init ─────────────────────────────────────────────
async function initApp() {
  try {
    currentUser = await api('/auth/me');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('public-view').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    applyTheme(currentUser.theme || 'dark');
    applyCustomization(currentUser);
    document.getElementById('user-menu').textContent = currentUser.username;
    await loadDashboard();
  } catch {
    logout();
  }
}

async function loadDashboard() {
  dashboard = await api('/dashboard');
  try { sharedPages = await api('/shared-pages'); } catch { sharedPages = []; }
  if (!activePageId && !activeSharedPageId && dashboard.length > 0) activePageId = dashboard[0].id;
  renderTabs();
  renderPage();
}

// ─── Theme & Customization ───────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
}

async function toggleTheme() {
  const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
  await api('/auth/theme', { method: 'PUT', body: { theme: newTheme } });
}

function applyCustomization(user) {
  if (user.background_url) {
    document.getElementById('bg-layer').style.backgroundImage = `url(${user.background_url})`;
    document.getElementById('bg-layer').style.display = 'block';
    document.getElementById('bg-overlay').style.display = 'block';
    document.getElementById('bg-overlay').style.opacity = user.background_overlay ?? 0.85;
  } else {
    clearBackground();
  }
  if (user.accent_color) {
    document.documentElement.style.setProperty('--accent', user.accent_color);
    // compute a lighter hover
    document.documentElement.style.setProperty('--accent-hover', user.accent_color + 'cc');
  } else {
    document.documentElement.style.removeProperty('--accent');
    document.documentElement.style.removeProperty('--accent-hover');
  }
}

function clearBackground() {
  document.getElementById('bg-layer').style.display = 'none';
  document.getElementById('bg-overlay').style.display = 'none';
}

// ─── Tabs ─────────────────────────────────────────────
function renderTabs() {
  const container = document.getElementById('tabs');
  let html = dashboard.map(p => `
    <div class="tab ${p.id === activePageId && !activeSharedPageId ? 'active' : ''}"
         onclick="switchPage(${p.id})" ondblclick="renamePage(${p.id})"
         oncontextmenu="pageContextMenu(event, ${p.id})">
      ${p.is_public ? '<span class="tab-icon">🌐</span>' : ''}
      ${esc(p.title)}
      ${dashboard.length > 1 ? `<span class="tab-close" onclick="event.stopPropagation();deletePage(${p.id})">×</span>` : ''}
    </div>
  `).join('');

  if (sharedPages.length > 0) {
    html += '<div style="width:1px;background:var(--border);margin:4px 6px;"></div>';
    html += sharedPages.map(p => `
      <div class="tab shared-tab ${p.id === activeSharedPageId ? 'active' : ''}"
           onclick="switchSharedPage(${p.id})">
        <span class="tab-icon">👥</span>
        ${esc(p.title)} <span style="font-size:11px;opacity:0.6">(${esc(p.owner_name)})</span>
      </div>
    `).join('');
  }
  container.innerHTML = html;
}

function switchPage(pageId) {
  activePageId = pageId;
  activeSharedPageId = null;
  renderTabs();
  renderPage();
}

function switchSharedPage(pageId) {
  activeSharedPageId = pageId;
  activePageId = null;
  renderTabs();
  renderPage();
}

async function addPage() {
  const title = prompt('Nom de la nouvelle page :');
  if (!title) return;
  const page = await api('/pages', { method: 'POST', body: { title } });
  dashboard.push({ ...page, columns: [] });
  activePageId = page.id;
  activeSharedPageId = null;
  renderTabs();
  renderPage();
}

async function renamePage(pageId) {
  const page = dashboard.find(p => p.id === pageId);
  const title = prompt('Nouveau nom :', page.title);
  if (!title || title === page.title) return;
  await api(`/pages/${pageId}`, { method: 'PUT', body: { title } });
  page.title = title;
  renderTabs();
}

async function deletePage(pageId) {
  if (!confirm('Supprimer cette page et tout son contenu ?')) return;
  await api(`/pages/${pageId}`, { method: 'DELETE' });
  dashboard = dashboard.filter(p => p.id !== pageId);
  if (activePageId === pageId) activePageId = dashboard[0]?.id;
  renderTabs();
  renderPage();
}

// ─── Page context menu ───────────────────────────────
function pageContextMenu(event, pageId) {
  event.preventDefault();
  event.stopPropagation();
  closeDropdowns();
  const page = dashboard.find(p => p.id === pageId);
  if (!page) return;

  const dropdown = document.createElement('div');
  dropdown.className = 'dropdown context-menu';
  dropdown.style.top = event.clientY + 'px';
  dropdown.style.left = event.clientX + 'px';
  dropdown.innerHTML = `
    <div class="dropdown-item" onclick="renamePage(${pageId});closeDropdowns()">Renommer</div>
    <div class="dropdown-item" onclick="sharePageDialog(${pageId});closeDropdowns()">Partager</div>
    <div class="dropdown-item" onclick="togglePagePublic(${pageId});closeDropdowns()">
      ${page.is_public ? 'Rendre privee' : 'Rendre publique'}
    </div>
    ${page.is_public ? `<div class="dropdown-item" onclick="copyPublicLink(${pageId});closeDropdowns()">Copier le lien public</div>` : ''}
    <div class="dropdown-sep"></div>
    ${dashboard.length > 1 ? `<div class="dropdown-item danger" onclick="deletePage(${pageId});closeDropdowns()">Supprimer</div>` : ''}
  `;
  document.body.appendChild(dropdown);
  setTimeout(() => document.addEventListener('click', closeDropdowns, { once: true }), 10);
}

async function togglePagePublic(pageId) {
  const page = dashboard.find(p => p.id === pageId);
  const newVal = !page.is_public;
  await api(`/pages/${pageId}/visibility`, { method: 'PUT', body: { is_public: newVal } });
  page.is_public = newVal ? 1 : 0;
  renderTabs();
  toast(newVal ? 'Page rendue publique' : 'Page rendue privee', 'success');
}

function copyPublicLink(pageId) {
  const url = `${location.origin}/#/public/${pageId}`;
  navigator.clipboard.writeText(url).then(() => toast('Lien copie !', 'success'));
}

async function sharePageDialog(pageId) {
  const data = await api(`/pages/${pageId}/shares`);
  let sharesHtml = data.shares.length > 0
    ? data.shares.map(s => `
      <div class="share-user-row">

async function doSharePage(pageId) {
  const username = document.getElementById('share-username').value.trim();

  try {

async function unsharePage(pageId, userId) {

// ─── Sortable (drag & drop) ──────────────────────────
function destroySortables() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];
}

function initSortables() {
  // Column reordering
  const colContainer = document.getElementById('columns-sortable');
  if (colContainer) {
    const cs = new Sortable(colContainer, {
      animation: 200, handle: '[data-drag-col]',
      ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
      direction: 'horizontal',
      onEnd: async () => {
        const order = [...colContainer.children].filter(el => el.dataset.colId).map(el => parseInt(el.dataset.colId));
        await api(`/pages/${activePageId}/columns/reorder`, { method: 'PUT', body: { order } });
        await loadDashboard();
      }
    });
    sortableInstances.push(cs);
  }

  // Widget sorting within columns
  document.querySelectorAll('.widgets-container').forEach(container => {
    const s = new Sortable(container, {
      group: 'widgets', animation: 200, handle: '.widget-header',
      ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
      onEnd: async (evt) => {
        const widgetId = parseInt(evt.item.dataset.widgetId);
        const targetColId = parseInt(evt.to.dataset.colId);
        const order = [...evt.to.children].filter(el => el.dataset.widgetId).map(el => parseInt(el.dataset.widgetId));
        await api('/widgets/move', { method: 'PUT', body: { widgetId, targetColumnId: targetColId, order } });
        await loadDashboard();
      }
    });
    sortableInstances.push(s);
  });

  document.querySelectorAll('.bookmarks-grid').forEach(grid => {
    const s = new Sortable(grid, {
      group: 'bookmarks', animation: 200, filter: '.bookmark-add',
      ghostClass: 'sortable-ghost',
      onEnd: async (evt) => {
        const bmId = parseInt(evt.item.dataset.bmId);
        const targetWidgetId = parseInt(evt.to.dataset.widgetId);
        const order = [...evt.to.children].filter(el => el.dataset.bmId).map(el => parseInt(el.dataset.bmId));
        if (evt.from.dataset.widgetId !== evt.to.dataset.widgetId) {
          await api('/bookmarks/move', { method: 'PUT', body: { bookmarkId: bmId, targetWidgetId, order } });
        } else {
          await api('/bookmarks/reorder', { method: 'PUT', body: { order } });
        }
        await loadDashboard();
      }
    });
    sortableInstances.push(s);
  });
}

// ─── Column resize ───────────────────────────────────
function colWidth(w) {
  if (!w || w <= 10) return (w || 1) * 300;
  return w;
}

let resizing = null;

function startColResize(e, colId) {
  e.preventDefault();
  const colEl = document.querySelector(`.column[data-col-id="${colId}"]`);
  if (!colEl) return;
  const startX = e.clientX;
  const startWidth = colEl.offsetWidth;
  colEl.classList.add('resizing');
  document.body.classList.add('col-resizing');

  function onMove(ev) {
    const delta = ev.clientX - startX;
    const newWidth = Math.max(200, Math.min(800, startWidth + delta));
    colEl.style.width = newWidth + 'px';
  }

  function onUp(ev) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    colEl.classList.remove('resizing');
    document.body.classList.remove('col-resizing');
    const finalWidth = colEl.offsetWidth;
    api(`/columns/${colId}`, { method: 'PUT', body: { width: finalWidth } });
    const page = dashboard.find(p => p.id === activePageId);
    if (page) {
      const col = page.columns.find(c => c.id === colId);
      if (col) col.width = finalWidth;
    }
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ─── Widget resize (vertical) ────────────────────────

function widgetPageNav(widgetId, dir) {
  const w = findWidget(widgetId);
  if (!w) return;
  const cur = getWidgetPage(widgetId);

  if (w.type === 'bookmarks') {

  } else if (w.type === 'rss') {
    const container = document.getElementById(`rss-${widgetId}`);
    if (container && container._allItems) {
      renderRSSPage(widgetId, container, container._allItems);
    }
  }
}

  if (type === 'rss') {
    html = '<div class="form-group"><label>URL du flux RSS</label><input type="url" id="col-rss-url" placeholder="https://example.com/feed.xml"></div>';
  } else if (type === 'weather') {

  } else if (type === 'embed') {
    html = '<div class="form-group"><label>URL a integrer</label><input type="url" id="col-embed-url" placeholder="https://example.com"></div>';
  } else if (type === 'ai') {
    html = `<div class="form-group"><label>Provider</label><select id="col-ai-provider"><option value="mistral">Mistral</option><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option></select></div>

  extra.innerHTML = html;
}

function getRSSFeeds(w) {
  if (w?.config?.feeds?.length) return w.config.feeds;
  if (w?.config?.url) return [{ url: w.config.url, title: '' }];
  return [];
}

function getRSSDisplaySettings(w) {
  return {
    articleCount: w?.config?.articleCount ?? 30,
    summaries: w?.config?.summaries ?? 'first',
    images: w?.config?.images ?? 'small',
    truncateTitles: w?.config?.truncateTitles ?? false,
    showTimestamps: w?.config?.showTimestamps ?? true,
    showPagination: w?.config?.showPagination ?? true,
  };
}

function feedFavicon(url) {
  try { const u = new URL(url); return 'https://www.google.com/s2/favicons?sz=32&domain=' + u.hostname; }
  catch { return ''; }
}

let _rssSettingsWidgetId = null;

  _rssSettingsWidgetId = widgetId;

  const feeds = getRSSFeeds(w);

  const feedListHTML = feeds.map((f, i) => rssSettingsFeedItem(f, i)).join('');

  const toggleHTML = (id, label, checked) =>
    '<div class="setting-toggle"><span>' + label + '</span><label class="toggle-switch"><input type="checkbox" id="' + id + '"' + (checked ? ' checked' : '') + '><span class="toggle-slider"></span></label></div>';

  showModal('Parametres RSS', '<div class="rss-settings-tabs">' +
    '<button class="rss-tab active" onclick="switchRSSTab(\'feeds\')">Flux RSS</button>' +
    '<button class="rss-tab" onclick="switchRSSTab(\'display\')">Affichage</button>' +
    '</div>' +
    '<div class="rss-tab-content active" id="rss-tab-feeds">' +
      '<div class="rss-feed-list" id="rss-feed-list">' + feedListHTML + '</div>' +
      '<button class="rss-add-feed" onclick="addRSSFeedRow()">+ Ajouter un nouveau flux RSS</button>' +
    '</div>' +
    '<div class="rss-tab-content" id="rss-tab-display">' +
      '<div class="setting-section"><div class="setting-label">Nombre d\'articles a afficher</div>' +
        '<select id="rss-set-count">' +
        [5,10,15,20,30].map(n => '<option value="'+n+'"'+(ds.articleCount===n?' selected':'')+'>'+n+' articles</option>').join('') +
        '</select></div>' +
      '<div class="setting-section"><div class="setting-label">Afficher les sommaires de</div>' +
        '<select id="rss-set-summaries">' +
        '<option value="first"'+(ds.summaries==='first'?' selected':'')+'>Seulement le premier article</option>' +
        '<option value="all"'+(ds.summaries==='all'?' selected':'')+'>Tous les articles</option>' +
        '<option value="none"'+(ds.summaries==='none'?' selected':'')+'>Aucun</option>' +
        '</select></div>' +
      '<div class="setting-section"><div class="setting-label">Afficher les images</div>' +
        '<select id="rss-set-images">' +
        '<option value="large"'+(ds.images==='large'?' selected':'')+'>Grandes images</option>' +
        '<option value="small"'+(ds.images==='small'?' selected':'')+'>Petites images</option>' +
        '<option value="none"'+(ds.images==='none'?' selected':'')+'>Aucune</option>' +
        '</select></div>' +
      toggleHTML('rss-set-truncate', 'Tronquer les titres', ds.truncateTitles) +
      toggleHTML('rss-set-timestamps', 'Afficher les horodatages', ds.showTimestamps) +
      toggleHTML('rss-set-pagination', 'Afficher les boutons de pagination', ds.showPagination) +
      '<button class="setting-apply-all" onclick="applyRSSSettingsToAll()">Appliquer a tous les widgets de cette page</button>' +
    '</div>'
  , saveRSSSettings);

}

function rssSettingsFeedItem(f, idx) {
  const fav = feedFavicon(f.url);
  const title = f.title || domainFromUrl(f.url);
  return '<div class="rss-feed-item" data-feed-idx="'+idx+'">' +
    '<span class="rss-feed-handle">&#x2630;</span>' +
    (fav ? '<img class="rss-feed-icon" src="'+esc(fav)+'" onerror="this.style.display=\'none\'">' : '') +
    '<div class="rss-feed-info"><div class="rss-feed-title">'+esc(title)+'</div><div class="rss-feed-url">'+esc(f.url)+'</div></div>' +
    '<button class="rss-feed-del" onclick="removeRSSFeedRow(this)" title="Supprimer">&times;</button>' +
    '</div>';
}

function domainFromUrl(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return url; }
}

function switchRSSTab(tab) {
  document.querySelectorAll('.rss-tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='feeds' && i===0) || (tab==='display' && i===1));
  });
  document.getElementById('rss-tab-feeds').classList.toggle('active', tab==='feeds');
  document.getElementById('rss-tab-display').classList.toggle('active', tab==='display');
}

function addRSSFeedRow() {
  const url = prompt('URL du flux RSS :');
  if (!url) return;
  const title = domainFromUrl(url);
  const list = document.getElementById('rss-feed-list');
  const idx = list.children.length;
  list.insertAdjacentHTML('beforeend', rssSettingsFeedItem({ url, title }, idx));
  initRSSFeedSortable();
}

function removeRSSFeedRow(btn) {
  btn.closest('.rss-feed-item').remove();
}

function initRSSFeedSortable() {
  const list = document.getElementById('rss-feed-list');
  if (!list || list._sortable) return;
  list._sortable = new Sortable(list, { animation: 200, handle: '.rss-feed-handle', ghostClass: 'sortable-ghost' });
}

function collectRSSFeeds() {
  const items = document.querySelectorAll('#rss-feed-list .rss-feed-item');
  return Array.from(items).map(el => ({
    url: el.querySelector('.rss-feed-url')?.textContent || '',
    title: el.querySelector('.rss-feed-title')?.textContent || ''
  })).filter(f => f.url);
}

function collectRSSDisplaySettings() {
  return {
    articleCount: parseInt(document.getElementById('rss-set-count')?.value) || 30,
    summaries: document.getElementById('rss-set-summaries')?.value || 'first',
    images: document.getElementById('rss-set-images')?.value || 'small',
    truncateTitles: document.getElementById('rss-set-truncate')?.checked ?? false,
    showTimestamps: document.getElementById('rss-set-timestamps')?.checked ?? true,
    showPagination: document.getElementById('rss-set-pagination')?.checked ?? true,
  };
}

async function saveRSSSettings() {
  const widgetId = _rssSettingsWidgetId;
  const feeds = collectRSSFeeds();
  const ds = collectRSSDisplaySettings();
  const config = { feeds, ...ds };
  await api('/widgets/' + widgetId, { method: 'PUT', body: { config } });
  closeModal();
  await loadDashboard();
}

async function applyRSSSettingsToAll() {
  const ds = collectRSSDisplaySettings();
  const page = dashboard.find(p => p.id === activePageId);
  if (!page) return;
  for (const col of page.columns) {
    for (const w of col.widgets) {
      if (w.type === 'rss') {
        const feeds = getRSSFeeds(w);
        await api('/widgets/' + w.id, { method: 'PUT', body: { config: { feeds, ...ds } } });
      }
    }
  }
  toast('Parametres appliques a tous les widgets RSS');
  closeModal();
  await loadDashboard();
}

function loadRSSFeeds(page) {
  if (!page) page = activeSharedPageId ? sharedPages.find(p => p.id === activeSharedPageId) : dashboard.find(p => p.id === activePageId);
  if (!page) return;
  for (const col of page.columns) {
    for (const w of col.widgets) {
      if (w.type !== 'rss') continue;
      const feeds = getRSSFeeds(w);
      if (feeds.length > 0) loadMultiRSS(w.id, feeds);
    }
  }
}

function rssItemHTML(item, idx, ds) {
  const date = item.pubDate ? new Date(item.pubDate) : null;
  const dateStr = date ? date.toLocaleString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '';
  const fullDateStr = date ? date.toLocaleString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
  const imgHtml = item.image ? '<img class="rss-item-img" src="' + esc(item.image) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';
  const snippet = item.contentSnippet || '';
  const showSnippet = ds.summaries === 'all' || (ds.summaries === 'first' && idx === 0);
  const snippetHtml = showSnippet && snippet ? '<div class="rss-item-snippet">' + esc(snippet.substring(0, 200)) + '</div>' : '';
  const imgAttr = item.image ? ' data-rss-img="' + esc(item.image) + '"' : '';
  const linkTarget = currentUser?.link_target || '_blank';
  return '<a class="rss-item" href="' + esc(item.link) + '" target="' + linkTarget + '"' +
    ' data-rss-title="' + esc(item.title) + '"' +
    ' data-rss-snippet="' + esc(snippet) + '"' +
    ' data-rss-date="' + esc(fullDateStr) + '"' + imgAttr +
    ' onmouseenter="showRSSTooltip(event, this)"' +
    ' onmousemove="moveRSSTooltip(event)"' +
    ' onmouseleave="hideRSSTooltip()">' +
    imgHtml +
    '<div class="rss-item-content">' +
      '<span class="rss-item-title">' + esc(item.title) + '</span>' +
      snippetHtml +
      '<span class="rss-item-date">' + dateStr + '</span>' +
    '</div></a>';
}

function rssContainerClasses(ds) {
  const cls = [];
  if (ds.images === 'none') cls.push('img-none');
  else if (ds.images === 'large') cls.push('img-large');
  else if (ds.images === 'small') cls.push('img-small');
  if (!ds.showTimestamps) cls.push('no-timestamps');
  if (ds.truncateTitles) cls.push('truncate-titles');
  return cls.join(' ');
}

function rssPerPage(ds) {
  if (ds.images === 'large') return 5;
  if (ds.images === 'none') return 15;
  return 10;
}

function renderRSSPage(widgetId, container, allItems) {
  const w = findWidget(widgetId);
  const ds = getRSSDisplaySettings(w);
  const limited = allItems.slice(0, ds.articleCount || 30);
  const perPage = rssPerPage(ds);
  const needsPaging = ds.showPagination && limited.length > perPage;
  const page = getWidgetPage(widgetId);
  const totalPages = needsPaging ? Math.ceil(limited.length / perPage) : 1;
  const items = needsPaging ? limited.slice(page * perPage, (page + 1) * perPage) : limited;

  container.className = 'rss-items ' + rssContainerClasses(ds);

  let html = items.map((it, i) => rssItemHTML(it, needsPaging ? page * perPage + i : i, ds)).join('');
  if (!html) html = '<div style="padding:12px;color:var(--text-muted);font-size:13px;">Aucun article</div>';
  if (needsPaging) {
    html += '<div class="widget-pagination">' +
      '<button onclick="widgetPageNav(' + widgetId + ',-1)"' + (page === 0 ? ' disabled' : '') + '>&#9664;</button>' +
      '<span>' + (page + 1) + ' / ' + totalPages + '</span>' +
      '<button onclick="widgetPageNav(' + widgetId + ',1)"' + (page >= totalPages - 1 ? ' disabled' : '') + '>&#9654;</button>' +
      '</div>';
  }
  container.innerHTML = html;
}

async function loadMultiRSS(widgetId, feeds) {
  const container = document.getElementById('rss-' + widgetId);
  if (!container) return;
  try {
    const results = await Promise.all(feeds.map(f =>
      api('/rss?url=' + encodeURIComponent(f.url)).catch(() => ({ items: [] }))
    ));
    let allItems = results.flatMap(r => r.items || []);
    allItems.sort((a, b) => {
      const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
      const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
      return db - da;
    });
    container._allItems = allItems;
    renderRSSPage(widgetId, container, allItems);
  } catch (err) {
    container.innerHTML = '<div style="padding:12px;color:var(--danger);font-size:13px;">Erreur: ' + esc(err.message) + '</div>';
  }
}


// ─── Weather ──────────────────────────────────────────
function loadWeatherWidgets(page) {
  if (!page) return;
  for (const col of page.columns) {
    for (const w of col.widgets) {
      if (w.type === 'weather' && w.config?.city) loadSingleWeather(w.id, w.config.city);
    }
  }
}

async function loadSingleWeather(widgetId, city) {
  const container = document.getElementById(`weather-${widgetId}`);
  if (!container) return;
  try {
    const data = await api(`/weather?city=${encodeURIComponent(city)}`);
    const grad = weatherGradient(data.weatherCode);
    const svgIcon = weatherSVG(data.weatherCode, 64);

    const uvVal = parseInt(data.uvIndex) || 0;
    const uvLabel = uvVal <= 2 ? 'Faible' : uvVal <= 5 ? 'Moyen' : uvVal <= 7 ? 'Eleve' : 'Tres eleve';

    let sunHtml = '';
    if (data.sunrise || data.sunset) {
      const sunSvg = '<svg viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="10" r="4" fill="#f59e0b"/><line x1="8" y1="2" x2="8" y2="4" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="5" x2="4.5" y2="6.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="5" x2="11.5" y2="6.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="14" x2="15" y2="14" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></svg>';
      const moonSvg = '<svg viewBox="0 0 16 16" width="14" height="14"><path d="M10 2C6.7 2 4 4.7 4 8s2.7 6 6 6c1.2 0 2.3-.4 3.2-1-.6.2-1.3.3-2 .3C7.4 13.3 4.7 10.6 4.7 7.3c0-2.5 1.5-4.6 3.6-5.5C9 1.9 9.5 2 10 2z" fill="#94a3b8"/></svg>';
      sunHtml = '<div class="weather-sun"><span>' + sunSvg + ' ' + esc(data.sunrise) + '</span><span>' + moonSvg + ' ' + esc(data.sunset) + '</span></div>';
    }

    let hourlyHtml = '';
    if (data.hourly && data.hourly.length > 0) {
      const nowH = new Date().getHours();
      const futureHours = data.hourly.filter(function(h) {
        return h.dayOffset > 0 || Math.floor(parseInt(h.time) / 100) >= nowH;
      }).slice(0, 8);
      if (futureHours.length > 0) {
        hourlyHtml = '<div class="weather-hourly">' + futureHours.map(function(h) {
          const hr = Math.floor(parseInt(h.time) / 100);
          const label = (h.dayOffset > 0 ? 'Dem. ' : '') + (hr < 10 ? '0' : '') + hr + ':00';
          return '<div class="weather-hourly-item">' +
            '<div class="wh-time">' + label + '</div>' +
            '<div class="wh-icon">' + weatherSVG(h.weatherCode, 24) + '</div>' +
            '<div class="wh-temp">' + h.temp_C + '°</div>' +
            (parseInt(h.chanceOfRain) > 0 ? '<div class="wh-rain">' + h.chanceOfRain + '%</div>' : '') +
            '</div>';
        }).join('') + '</div>';
      }
    }

    let forecastHtml = '';
    if (data.forecast && data.forecast.length > 0) {
      forecastHtml = '<div class="weather-forecast-5d">' + data.forecast.map(function(d) {
        const date = new Date(d.date);
        const dayName = date.toLocaleDateString('fr-FR', { weekday: 'short' });
        return '<div class="weather-forecast-day">' +
          '<div class="wf-date">' + dayName + '</div>' +
          '<div class="wf-icon">' + weatherSVG(d.weatherCode, 28) + '</div>' +
          '<div class="wf-temps">' + d.minTemp_C + '° / ' + d.maxTemp_C + '°</div>' +
          (parseInt(d.chanceOfRain) > 0 ? '<div class="wf-rain">' + d.chanceOfRain + '%</div>' : '') +
          '</div>';
      }).join('') + '</div>';
    }

    container.innerHTML =
      '<div class="weather-widget" style="background:' + grad + '">' +
        '<div class="weather-current">' +
          '<div class="weather-svg-icon">' + svgIcon + '</div>' +
          '<div>' +
            '<div class="weather-temp">' + data.temp_C + '°C</div>' +
            '<div class="weather-desc">' + esc(data.description) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="weather-info-grid">' +
          '<div class="weather-info-item"><span class="wi-label">Ressenti</span><span class="wi-value">' + data.feels_like_C + '°C</span></div>' +
          '<div class="weather-info-item"><span class="wi-label">Humidite</span><span class="wi-value">' + data.humidity + '%</span></div>' +
          '<div class="weather-info-item"><span class="wi-label">Vent</span><span class="wi-value">' + windArrow(data.windDirection) + data.wind_kmph + ' km/h</span></div>' +
          '<div class="weather-info-item"><span class="wi-label">UV</span><span class="wi-value">' + data.uvIndex + ' <span style="font-weight:400;font-size:10px;color:var(--text-muted)">' + uvLabel + '</span></span></div>' +
          '<div class="weather-info-item"><span class="wi-label">Pluie</span><span class="wi-value">' + data.precipMM + ' mm</span></div>' +
          '<div class="weather-info-item"><span class="wi-label">Pression</span><span class="wi-value">' + data.pressure + ' hPa</span></div>' +
        '</div>' +
        sunHtml +
        hourlyHtml +
        forecastHtml +
        '<div class="weather-link"><a href="https://meteofrance.com/recherche/all?query=' + encodeURIComponent(city) + '" target="_blank" rel="noopener">Prévisions sur Météo France ↗</a></div>' +
      '</div>';
  } catch (err) {
    container.innerHTML = '<div class="weather-error">Erreur: ' + esc(err.message) + '</div>';
  }
}

function weatherType(code) {
  const c = parseInt(code);
  if (c === 113) return 'sunny';
  if (c === 116) return 'partly';
  if (c === 119 || c === 122) return 'cloudy';
  if (c === 143 || c === 248 || c === 260) return 'fog';
  if ([176,263,266,293,296,299,302,305,308,311,314,317,353,356,359].includes(c)) return 'rain';
  if ([179,182,185,227,230,320,323,326,329,332,335,338,362,365,368,371,374,377].includes(c)) return 'snow';
  if ([200,386,389,392,395].includes(c)) return 'storm';
  return 'partly';
}

function weatherSVG(code, size) {
  const s = size || 64;
  const t = weatherType(code);
  const cloud = '<path d="M20 28c-4.4 0-8-3.1-8-7s3.6-7 8-7c.5-4 4.2-7 8.5-7 4.7 0 8.5 3.5 8.5 8 0 .3 0 .7-.1 1C39.2 17.2 41 19.8 41 23c0 3.9-3.6 5-5 5H20z"';
  if (t === 'sunny') return '<svg viewBox="0 0 48 48" width="'+s+'" height="'+s+'"><g transform="translate(24,24)"><g style="animation:weather-spin 12s linear infinite"><circle cx="0" cy="0" r="8" fill="#f59e0b"/><g stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round">' +
    '<line x1="0" y1="-13" x2="0" y2="-18"/><line x1="0" y1="13" x2="0" y2="18"/><line x1="-13" y1="0" x2="-18" y2="0"/><line x1="13" y1="0" x2="18" y2="0"/>' +
    '<line x1="-9.2" y1="-9.2" x2="-12.7" y2="-12.7"/><line x1="9.2" y1="-9.2" x2="12.7" y2="-12.7"/><line x1="-9.2" y1="9.2" x2="-12.7" y2="12.7"/><line x1="9.2" y1="9.2" x2="12.7" y2="12.7"/>' +
    '</g></g></g></svg>';
  if (t === 'partly') return '<svg viewBox="0 0 48 48" width="'+s+'" height="'+s+'"><g style="animation:weather-spin 12s linear infinite;transform-origin:14px 14px"><circle cx="14" cy="14" r="7" fill="#f59e0b"/><g stroke="#f59e0b" stroke-width="2" stroke-linecap="round">' +
    '<line x1="14" y1="3" x2="14" y2="0"/><line x1="14" y1="25" x2="14" y2="28"/><line x1="3" y1="14" x2="0" y2="14"/><line x1="25" y1="14" x2="28" y2="14"/>' +
    '<line x1="6.2" y1="6.2" x2="4" y2="4"/><line x1="21.8" y1="6.2" x2="24" y2="4"/>' +
    '</g></g>' + cloud + ' fill="#94a3b8" style="animation:weather-float 4s ease-in-out infinite"/></svg>';
  if (t === 'cloudy') return '<svg viewBox="0 0 48 48" width="'+s+'" height="'+s+'"><path d="M14 24c-3 0-5.5-2-5.5-5s2.5-5 5.5-5c.4-3 3-5 6-5s5.5 2.5 5.5 5.5v.5c1.5.5 2.5 2 2.5 4 0 2.5-2 5-4 5H14z" fill="#64748b" style="animation:weather-float 5s ease-in-out infinite"/>' +
    cloud + ' fill="#94a3b8" style="animation:weather-float 4s ease-in-out infinite;animation-delay:-1.5s"/></svg>';
  if (t === 'fog') return '<svg viewBox="0 0 48 48" width="'+s+'" height="'+s+'">' + cloud + ' fill="#94a3b8"/>' +
    '<g stroke="#94a3b8" stroke-width="2" stroke-linecap="round" style="animation:weather-fog 3s ease-in-out infinite">' +
    '<line x1="12" y1="32" x2="36" y2="32"/><line x1="14" y1="36" x2="34" y2="36"/><line x1="16" y1="40" x2="32" y2="40"/></g></svg>';
  if (t === 'rain') return '<svg viewBox="0 0 48 48" width="'+s+'" height="'+s+'">' + cloud + ' fill="#94a3b8" style="animation:weather-float 4s ease-in-out infinite"/>' +
    '<g fill="#38bdf8">' +
    '<circle cx="20" cy="34" r="1.3" style="animation:weather-rain 1s ease-in infinite"/>' +
    '<circle cx="26" cy="36" r="1.3" style="animation:weather-rain 1s ease-in infinite;animation-delay:0.3s"/>' +
    '<circle cx="32" cy="33" r="1.3" style="animation:weather-rain 1s ease-in infinite;animation-delay:0.6s"/>' +
    '<circle cx="23" cy="38" r="1.3" style="animation:weather-rain 1s ease-in infinite;animation-delay:0.15s"/>' +
    '<circle cx="29" cy="39" r="1.3" style="animation:weather-rain 1s ease-in infinite;animation-delay:0.45s"/>' +
    '</g></svg>';
  if (t === 'snow') return '<svg viewBox="0 0 48 48" width="'+s+'" height="'+s+'">' + cloud + ' fill="#94a3b8" style="animation:weather-float 4s ease-in-out infinite"/>' +
    '<g fill="#e2e8f0">' +
    '<circle cx="20" cy="34" r="1.5" style="animation:weather-snow 2s ease-in infinite"/>' +
    '<circle cx="27" cy="36" r="1.5" style="animation:weather-snow 2s ease-in infinite;animation-delay:0.5s"/>' +
    '<circle cx="33" cy="33" r="1.5" style="animation:weather-snow 2s ease-in infinite;animation-delay:1s"/>' +
    '<circle cx="23" cy="39" r="1.5" style="animation:weather-snow 2s ease-in infinite;animation-delay:0.3s"/>' +
    '<circle cx="30" cy="40" r="1.5" style="animation:weather-snow 2s ease-in infinite;animation-delay:0.8s"/>' +
    '</g></svg>';
  if (t === 'storm') return '<svg viewBox="0 0 48 48" width="'+s+'" height="'+s+'">' + cloud + ' fill="#64748b" style="animation:weather-float 3s ease-in-out infinite"/>' +
    '<polygon points="26,28 22,36 25,36 21,44 30,34 26,34 30,28" fill="#fbbf24" style="animation:weather-flash 3s ease-in-out infinite"/>' +
    '<g fill="#38bdf8">' +
    '<circle cx="18" cy="35" r="1.2" style="animation:weather-rain 0.8s ease-in infinite"/>' +
    '<circle cx="34" cy="34" r="1.2" style="animation:weather-rain 0.8s ease-in infinite;animation-delay:0.4s"/>' +
    '</g></svg>';
  return weatherSVG(116, s);
}

function weatherGradient(code) {
  const t = weatherType(code);
  if (t === 'sunny') return 'linear-gradient(135deg, rgba(251,191,36,0.15), rgba(245,158,11,0.05))';
  if (t === 'partly') return 'linear-gradient(135deg, rgba(251,191,36,0.08), rgba(148,163,184,0.06))';
  if (t === 'cloudy') return 'linear-gradient(135deg, rgba(148,163,184,0.12), rgba(100,116,139,0.05))';
  if (t === 'fog') return 'linear-gradient(135deg, rgba(148,163,184,0.10), rgba(100,116,139,0.04))';
  if (t === 'rain') return 'linear-gradient(135deg, rgba(56,189,248,0.12), rgba(30,64,175,0.05))';
  if (t === 'snow') return 'linear-gradient(135deg, rgba(226,232,240,0.12), rgba(148,163,184,0.05))';
  if (t === 'storm') return 'linear-gradient(135deg, rgba(100,116,139,0.15), rgba(30,41,59,0.08))';
  return 'linear-gradient(135deg, rgba(148,163,184,0.08), rgba(100,116,139,0.04))';
}

function windArrow(dir) {
  const dirs = {N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
  const deg = dirs[dir] !== undefined ? dirs[dir] : 0;
  return '<svg viewBox="0 0 16 16" width="14" height="14" style="transform:rotate('+deg+'deg)"><path d="M8 2 L12 12 L8 9 L4 12 Z" fill="var(--text-muted)"/></svg>';
}

// ─── Clock ────────────────────────────────────────────
function stopClocks() {
  clockIntervals.forEach(id => clearInterval(id));
  clockIntervals = [];
}

function startClocks() {
  document.querySelectorAll('[data-clock]').forEach(el => {
    function update() {
      const tz = el.dataset.tz;
      const f24 = el.dataset.f24 === 'true';
      const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: !f24 };
      if (tz) opts.timeZone = tz;
      const dateOpts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
      if (tz) dateOpts.timeZone = tz;
      try {
        el.querySelector('.clock-time').textContent = new Date().toLocaleTimeString('fr-FR', opts);
        el.querySelector('.clock-date').textContent = new Date().toLocaleDateString('fr-FR', dateOpts);
      } catch {
        el.querySelector('.clock-time').textContent = new Date().toLocaleTimeString('fr-FR');
        el.querySelector('.clock-date').textContent = new Date().toLocaleDateString('fr-FR');
      }
    }
    update();
    clockIntervals.push(setInterval(update, 1000));
  });
}

// ─── Search ───────────────────────────────────────────
function doSearch(event, engine, customUrl) {
  event.preventDefault();
  const query = event.target.querySelector('input').value;
  if (!query) return;
  const urls = {
    google: 'https://www.google.com/search?q=',
    duckduckgo: 'https://duckduckgo.com/?q=',
    bing: 'https://www.bing.com/search?q='
  };
  let url;
  if (engine === 'custom' && customUrl) {
    url = customUrl.replace('%s', encodeURIComponent(query));
  } else {
    url = (urls[engine] || urls.google) + encodeURIComponent(query);
  }
  window.open(url, currentUser?.link_target || '_blank');
}

function showUserMenu(event) {
  event.stopPropagation();

  dropdown.className = 'dropdown context-menu';

  const isFirefox = navigator.userAgent.includes('Firefox');
  const isEdge = navigator.userAgent.includes('Edg/');
  const isChrome = !isFirefox && !isEdge && navigator.userAgent.includes('Chrome');

  if (isFirefox) {
    window.location.href = '/launchy-extension.xpi';

  const browserName = isEdge ? 'Edge' : isChrome ? 'Chrome / Brave' : 'votre navigateur';
  setTimeout(() => {
    showModal('Extension ' + browserName, `

  `, async () => {
    const background_url = document.getElementById('settings-bg-url').value;
    const background_overlay = parseInt(document.getElementById('settings-bg-opacity').value) / 100;
    const accent_color = document.getElementById('settings-accent').value;
    const link_target = document.getElementById('settings-link-target').value;
    const defaultAccent = accent_color === '#4a9eff' ? '' : accent_color;
    currentUser = await api('/auth/customization', { method: 'PUT', body: { background_url, background_overlay, accent_color: defaultAccent, link_target } });
    applyCustomization(currentUser);
    closeModal();
    toast('Personnalisation sauvegardee', 'success');
  });

  document.getElementById('settings-bg-opacity').addEventListener('input', (e) => {
    e.target.previousElementSibling.textContent = `Opacite du fond (${e.target.value}%)`;
  });
}

function exportBookmarks() {
  window.open('/api/export/bookmarks?token=' + token, '_blank');
  // Fallback: use fetch
  fetch('/api/export/bookmarks', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'launchy-bookmarks.html'; a.click();
      URL.revokeObjectURL(url);
    });
}

function exportOPML() {
  fetch('/api/export/opml', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'launchy-feeds.opml'; a.click();
      URL.revokeObjectURL(url);
    });
}

function importBookmarks() {
  const input = document.getElementById('import-file-input');
  input.accept = '.html,.htm';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const content = await file.text();
    try {
      const result = await api('/import/bookmarks', { method: 'POST', body: { content } });
      toast(`${result.imported} favoris importes`, 'success');
      closeModal();
      await loadDashboard();
    } catch (err) { toast(err.message, 'error'); }
    input.value = '';
  };
  input.click();
}

function importOPML() {
  const input = document.getElementById('import-file-input');
  input.accept = '.opml,.xml';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const content = await file.text();
    try {
      const result = await api('/import/opml', { method: 'POST', body: { content } });
      toast(`${result.imported} flux importes`, 'success');
      closeModal();
      await loadDashboard();
    } catch (err) { toast(err.message, 'error'); }
    input.value = '';
  };
  input.click();
}
