function handleIconUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 200 * 1024) { toast('Fichier trop lourd (max 200 Ko)', 'error'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUri = e.target.result;
    document.getElementById('bm-icon-value').value = dataUri;
    const preview = document.getElementById('icon-preview-box');
    preview.classList.remove('hidden');
    document.getElementById('icon-preview-img').src = dataUri;
    document.getElementById('icon-preview-name').textContent = file.name;
    toast('Icone chargee', 'success');
  };
  reader.readAsDataURL(file);
}

function handleIconDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image')) return;
  const fakeInput = { files: [file] };
  handleIconUpload(fakeInput);
}

function renderIconGrid(icons) {

let iconSearchTimeout = null;
function filterIcons(query) {
  const q = query.toLowerCase().trim();
  let filtered = ICON_LIBRARY;
  if (activeIconCat !== 'all') filtered = filtered.filter(i => ICON_CAT_MAP[i.s] === activeIconCat);
  if (q) filtered = filtered.filter(i => i.n.toLowerCase().includes(q) || i.s.toLowerCase().includes(q));
  renderIconGrid(filtered);

  clearTimeout(iconSearchTimeout);
  if (q && q.length >= 2) {
    iconSearchTimeout = setTimeout(() => tryDynamicIcon(q), 400);
  }
}

function tryDynamicIcon(query) {
  const slug = query.toLowerCase().replace(/[^a-z0-9]/g, '');
  const alreadyExists = ICON_LIBRARY.some(i => i.s === slug);
  if (alreadyExists) return;

  const testImg = new Image();
  testImg.onload = () => {
    const grid = document.getElementById('icon-grid');
    if (!grid) return;
    const existing = grid.querySelector(`[data-slug="${slug}"]`);
    if (existing) return;
    const div = document.createElement('div');
    div.className = 'icon-grid-item';
    div.dataset.slug = slug;
    div.onclick = () => selectIcon(slug, query);
    div.innerHTML = `<img src="${siUrl(slug)}" alt="${esc(query)}" style="width:28px;height:28px"><span>${esc(query)}</span>`;
    grid.insertBefore(div, grid.firstChild);
  };
  testImg.src = siUrl(slug);

  const variants = [
    query.toLowerCase().replace(/\s+/g, ''),
    query.toLowerCase().replace(/\s+/g, '-'),
    query.toLowerCase().replace(/\s+/g, 'dot'),
  ];
  variants.forEach(v => {
    if (v === slug) return;
    const testImg2 = new Image();
    testImg2.onload = () => {
      const grid = document.getElementById('icon-grid');
      if (!grid || grid.querySelector(`[data-slug="${v}"]`)) return;
      const div = document.createElement('div');
      div.className = 'icon-grid-item';
      div.dataset.slug = v;
      div.onclick = () => selectIcon(v, query);
      div.innerHTML = `<img src="${siUrl(v)}" alt="${esc(query)}" style="width:28px;height:28px"><span>${esc(query)}</span>`;
      grid.insertBefore(div, grid.firstChild);
    };
    testImg2.src = siUrl(v);
  });
}

function selectIcon(slug, name) {
  const url = siUrl(slug);
  document.getElementById('bm-icon-value').value = url;
  document.querySelectorAll('.icon-grid-item').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`[data-slug="${slug}"]`);
  if (el) el.classList.add('selected');
  const preview = document.getElementById('icon-preview-box');
  preview.classList.remove('hidden');
  document.getElementById('icon-preview-img').src = url;
  document.getElementById('icon-preview-name').textContent = name;

function setIconTab(tab) {
  const tabMap = {auto:'Auto', library:'Biblio', emoji:'Emoji', upload:'Upload', custom:'URL'};
  document.querySelectorAll('.icon-tab').forEach(btn => {
    const t = btn.textContent.trim();
    btn.classList.toggle('active', t === tabMap[tab] || t === 'Bibliotheque' && tab === 'library');

  ['auto','library','emoji','upload','custom'].forEach(t => {

// ─── Markdown (lightweight) ──────────────────────────
function renderMd(text) {
  let html = esc(text);
  html = html.replace(/^### (.+)$/gm, '<strong style="font-size:14px">$1</strong>');
  html = html.replace(/^## (.+)$/gm, '<strong style="font-size:15px">$1</strong>');
  html = html.replace(/^# (.+)$/gm, '<strong style="font-size:16px">$1</strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code style="background:var(--bg-input);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>');
  html = html.replace(/^- (.+)$/gm, '<span style="display:block;padding-left:12px">• $1</span>');
  html = html.replace(/^\d+\. (.+)$/gm, (m, p1, offset, str) => {
    const num = m.match(/^(\d+)/)[1];
    return `<span style="display:block;padding-left:12px">${num}. ${p1}</span>`;
  });
  html = html.replace(/\n/g, '<br>');
  return html;
}

async function loadAIMessages(widgetId) {

  try {
    const msgs = await api('/ai/messages/' + widgetId);
    container.innerHTML = msgs.map(m =>
      `<div class="ai-msg ${esc(m.role)}">${m.role === 'assistant' ? renderMd(m.content) : esc(m.content)}</div>`
    ).join('');
    container.scrollTop = container.scrollHeight;
  } catch {}
}

  ).join('');

async function sendAIMessage(event, widgetId) {
  event.preventDefault();
  const input = document.getElementById('ai-input-' + widgetId);
  const btn = document.getElementById('ai-send-' + widgetId);
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  const container = document.getElementById('ai-messages-' + widgetId);
  const userDiv = document.createElement('div');
  userDiv.className = 'ai-msg user';
  userDiv.textContent = text;
  container.appendChild(userDiv);

  btn.disabled = true;
  const typing = document.createElement('div');
  typing.className = 'ai-typing';
  typing.textContent = 'Reflexion en cours...';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;

  try {
    const res = await api('/ai/chat', { method: 'POST', body: { widgetId, message: text } });
    const assistDiv = document.createElement('div');
    assistDiv.className = 'ai-msg assistant';
    assistDiv.innerHTML = renderMd(res.content);
    container.appendChild(assistDiv);
  } catch (e) {
    const errDiv = document.createElement('div');
    errDiv.className = 'ai-msg error';
    errDiv.textContent = e.message || 'Erreur';
    container.appendChild(errDiv);
  }
  typing.remove();
  btn.disabled = false;
  container.scrollTop = container.scrollHeight;
  input.focus();
}

  await api('/ai/messages/' + widgetId, { method: 'DELETE' });

// ─── Helpers ──────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

const ICON_COLORS = [
  '#e94b2e','#38bdf8','#a855f7','#f59e0b','#10b981',
  '#ec4899','#6366f1','#14b8a6','#f97316','#8b5cf6',
  '#06b6d4','#ef4444','#84cc16','#d946ef','#0ea5e9'
];

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function genIcon(title) {
  const initials = (title || '?').split(/[\s\-_.\/]+/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
  const letter = initials || '?';
  const color = ICON_COLORS[hashStr(title || '') % ICON_COLORS.length];
  const fontSize = letter.length > 1 ? 16 : 20;
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42"><rect width="42" height="42" rx="12" fill="${color}"/><text x="21" y="${letter.length > 1 ? 27 : 28}" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="700" font-size="${fontSize}">${letter}</text></svg>`)}`;
}

function onFaviconLoad(img, title) {
  if (img.naturalWidth <= 18 && img.naturalHeight <= 18) {
    img.src = genIcon(title);
  }
}

function onFaviconError(img, title) {
  img.src = genIcon(title);
}

function toggleViewMode(event, widgetId, type) {
  event.stopPropagation();
  closeDropdowns();
  const w = findWidget(widgetId);
  const currentMode = w?.config?.viewMode || '';
  const modes = VIEW_MODES[type] || [];

  const rect = event.target.getBoundingClientRect();
  const dropdown = document.createElement('div');
  dropdown.className = 'dropdown context-menu';
  dropdown.style.top = (rect.bottom + 4) + 'px';
  dropdown.style.right = (window.innerWidth - rect.right) + 'px';
  dropdown.innerHTML = modes.map(m =>
    `<div class="dropdown-item ${m.key === currentMode ? 'active' : ''}" style="${m.key === currentMode ? 'color:var(--accent);font-weight:600' : ''}" onclick="event.stopPropagation();setViewMode(${widgetId},'${m.key}')">
      <span>${m.icon}</span> ${m.label}

  ).join('');

  document.body.appendChild(dropdown);
  setTimeout(() => document.addEventListener('click', closeDropdowns, { once: true }), 10);
}

  const date = el.dataset.rssDate || '';
  const img = el.dataset.rssImg || '';

  if (!snippet && !img) return;

  document.getElementById('rss-tooltip-title').textContent = title;
  document.getElementById('rss-tooltip-snippet').textContent = snippet;
  document.getElementById('rss-tooltip-date').textContent = date;

  const imgEl = document.getElementById('rss-tooltip-img');
  if (img) {
    imgEl.src = img;
    imgEl.style.display = 'block';
    imgEl.onerror = () => imgEl.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
  }

  clearTimeout(rssTooltipTimer);
  rssTooltipTimer = setTimeout(() => {
    positionTooltip(event);
    tooltip.classList.add('show');
  }, 350);
}

function moveRSSTooltip(event) {
  const tooltip = document.getElementById('rss-tooltip');
  if (tooltip.classList.contains('show')) {
    positionTooltip(event);
  }
}

function positionTooltip(event) {
  const tooltip = document.getElementById('rss-tooltip');
  const pad = 16;
  let x = event.clientX + pad;
  let y = event.clientY + pad;

  const w = tooltip.offsetWidth || 380;
  const h = tooltip.offsetHeight || 200;

  if (x + w > window.innerWidth - pad) x = event.clientX - w - pad;
  if (y + h > window.innerHeight - pad) y = event.clientY - h - pad;
  if (x < pad) x = pad;
  if (y < pad) y = pad;

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideRSSTooltip() {
  clearTimeout(rssTooltipTimer);
  document.getElementById('rss-tooltip').classList.remove('show');
}

// ─── Keyboard shortcuts ──────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeDropdowns(); }
});

// ─── Init on load ─────────────────────────────────────
if (!checkPublicPage()) {
  if (token) initApp();
}

window.addEventListener('hashchange', () => {
  if (checkPublicPage()) {
    document.getElementById('app').style.display = 'none';
  }
});
</script>
</body>
